<h2>音乐可视化风格</h2>
<p class="subtitle">你希望生成的视频是哪种视觉风格？</p>

<div class="cards">
  <div class="card" data-choice="spectrum" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0a0a1a;display:flex;align-items:center;justify-content:center;height:140px;gap:3px">
      <div style="display:flex;align-items:flex-end;gap:3px;height:100px">
        <div style="width:8px;height:40px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:70px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:90px;background:linear-gradient(to top,#00f5ff,#7b2fff);border-radius:2px"></div>
        <div style="width:8px;height:60px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:100px;background:linear-gradient(to top,#00f5ff,#ff00aa);border-radius:2px"></div>
        <div style="width:8px;height:80px;background:linear-gradient(to top,#00f5ff,#7b2fff);border-radius:2px"></div>
        <div style="width:8px;height:50px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:65px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:85px;background:linear-gradient(to top,#00f5ff,#ff00aa);border-radius:2px"></div>
        <div style="width:8px;height:45px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
        <div style="width:8px;height:75px;background:linear-gradient(to top,#00f5ff,#7b2fff);border-radius:2px"></div>
        <div style="width:8px;height:55px;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 频谱条形 Spectrum Bars</h3>
      <p>经典霓虹频谱柱，颜色随节奏变化，强拍时爆闪。科技感强，适合电子/说唱音乐。</p>
    </div>
  </div>

  <div class="card" data-choice="waveform" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0d0d0d;display:flex;align-items:center;justify-content:center;height:140px">
      <svg width="260" height="80" viewBox="0 0 260 80">
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ff6b6b"/>
            <stop offset="50%" stop-color="#ffd93d"/>
            <stop offset="100%" stop-color="#6bcb77"/>
          </linearGradient>
        </defs>
        <path d="M0,40 Q10,10 20,40 Q30,70 40,40 Q50,5 60,40 Q70,75 80,40 Q90,8 100,40 Q110,72 120,40 Q130,12 140,40 Q150,68 160,40 Q170,15 180,40 Q190,65 200,40 Q210,20 220,40 Q230,60 240,40 Q250,25 260,40" stroke="url(#wg)" stroke-width="2.5" fill="none"/>
        <path d="M0,40 Q10,20 20,40 Q30,60 40,40 Q50,15 60,40 Q70,65 80,40 Q90,18 100,40 Q110,62 120,40 Q130,22 140,40 Q150,58 160,40 Q170,25 180,40 Q190,55 200,40 Q210,30 220,40 Q230,50 240,40 Q250,35 260,40" stroke="rgba(255,107,107,0.3)" stroke-width="1" fill="none"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B — 波形流动 Waveform Flow</h3>
      <p>流动的音频波形线，渐变色彩随情绪变化。优雅细腻，适合流行/民谣/古典音乐。</p>
    </div>
  </div>

  <div class="card" data-choice="particle" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#050510;display:flex;align-items:center;justify-content:center;height:140px;position:relative;overflow:hidden">
      <div style="position:relative;width:120px;height:120px">
        <div style="position:absolute;width:6px;height:6px;border-radius:50%;background:#ff00ff;top:20px;left:30px;box-shadow:0 0 8px #ff00ff"></div>
        <div style="position:absolute;width:4px;height:4px;border-radius:50%;background:#00ffff;top:40px;left:80px;box-shadow:0 0 6px #00ffff"></div>
        <div style="position:absolute;width:8px;height:8px;border-radius:50%;background:#ffff00;top:60px;left:50px;box-shadow:0 0 12px #ffff00"></div>
        <div style="position:absolute;width:5px;height:5px;border-radius:50%;background:#ff6600;top:30px;left:60px;box-shadow:0 0 8px #ff6600"></div>
        <div style="position:absolute;width:3px;height:3px;border-radius:50%;background:#00ff88;top:80px;left:20px;box-shadow:0 0 6px #00ff88"></div>
        <div style="position:absolute;width:7px;height:7px;border-radius:50%;background:#ff00ff;top:70px;left:90px;box-shadow:0 0 10px #ff00ff"></div>
        <div style="position:absolute;width:4px;height:4px;border-radius:50%;background:#00ffff;top:15px;left:100px;box-shadow:0 0 6px #00ffff"></div>
        <div style="position:absolute;width:5px;height:5px;border-radius:50%;background:#ff6600;top:90px;left:65px;box-shadow:0 0 8px #ff6600"></div>
        <div style="position:absolute;width:6px;height:6px;border-radius:50%;background:#00ff88;top:50px;left:15px;box-shadow:0 0 10px #00ff88"></div>
        <div style="position:absolute;width:9px;height:9px;border-radius:50%;background:#ffff00;top:100px;left:40px;box-shadow:0 0 14px #ffff00"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C — 粒子爆炸 Particle Burst</h3>
      <p>数千个粒子随节奏爆炸扩散，强拍时发光冲击。震撼动感，适合 EDM/摇滚/嘻哈。</p>
    </div>
  </div>

  <div class="card" data-choice="circular" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#080818;display:flex;align-items:center;justify-content:center;height:140px">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff00aa"/>
            <stop offset="100%" stop-color="#7b2fff"/>
          </linearGradient>
        </defs>
        <circle cx="65" cy="65" r="30" fill="none" stroke="rgba(123,47,255,0.3)" stroke-width="1"/>
        <circle cx="65" cy="65" r="45" fill="none" stroke="rgba(123,47,255,0.2)" stroke-width="1"/>
        <!-- radial bars -->
        <line x1="65" y1="65" x2="65" y2="20" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="95" y2="30" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="105" y2="55" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="105" y2="80" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="90" y2="100" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="65" y2="110" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="40" y2="100" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="25" y2="80" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="25" y2="55" stroke="url(#cg)" stroke-width="2"/>
        <line x1="65" y1="65" x2="35" y2="30" stroke="url(#cg)" stroke-width="2"/>
        <circle cx="65" cy="65" r="8" fill="url(#cg)" opacity="0.9"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>D — 环形放射 Circular Radial</h3>
      <p>圆形放射频谱，像花朵/星爆一样绽放，旋转感极强。梦幻艺术风，适合所有音乐类型。</p>
    </div>
  </div>
</div>
