<h2>UI 布局 — 左侧控制面板</h2>
<p class="subtitle">控制面板在左，可视化画布在右</p>

<div class="mockup">

  <div class="mockup-body" style="background:#080818;padding:0;overflow:hidden;border-radius:6px">

    </div>
    <div style="display:flex;height:280px">
      <!-- Left: sidebar -->

        <div style="background:#7b2fff;color:#fff;padding:5px 8px;border-radius:4px;font-size:10px">■ Spectrum Bars</div>

        <div style="background:#1a1a3a;color:#aaa;padding:5px 8px;border-radius:4px;font-size:10px">◎ Circular Radial</div>
        
        <div style="height:1px;background:#1a1a3a;margin:4px 0"></div>
        
        <div style="color:#aaa;font-size:10px;text-transform:uppercase;letter-spacing:1px">文件</div>
        <div style="background:#7b2fff22;border:1px dashed #7b2fff;color:#7b2fff;padding:8px;border-radius:4px;text-align:center;font-size:10px">+ 选择 / 拖拽文件</div>
        
        <div style="height:1px;background:#1a1a3a;margin:4px 0"></div>
        
        <div style="color:#aaa;font-size:10px;text-transform:uppercase;letter-spacing:1px">音乐信息</div>
        <div style="font-size:10px">
          <div style="color:#00f5ff">BPM: <span style="color:#fff">128</span></div>
          <div style="color:#00f5ff;margin-top:2px">Key: <span style="color:#fff">Am</span></div>

          <div style="width:8px;height:42%;background:linear-gradient(to top,#00f5ff,#0080ff);border-radius:2px"></div>

          <div style="width:8px;height:91%;background:linear-gradient(to top,#00f5ff,#ff00aa);border-radius:2px;box-shadow:0 0 10px #ff00aa55"></div>
          <div style="width:8px;height:57%;background:linear-gradient(to top,#00f5ff,#7b2fff);border-radius:2px"></div>
        </div>
        <div style="position:absolute;bottom:10px;left:12px;color:#555;font-size:11px">▶ song.mp3 &nbsp; 2:34 / 3:47</div>
        <div style="position:absolute;bottom:10px;right:12px;color:#333;font-size:10px">Canvas 实时渲染</div>
      </div>
    </div>
    <!-- Bottom progress -->
    <div style="background:#0d0d2a;padding:8px 16px;display:flex;align-items:center;gap:10px;border-top:1px solid #1a1a3a">
      <span style="color:#aaa;font-size:16px">⏮</span>
      <span style="color:#fff;font-size:20px">⏸</span>
      <span style="color:#aaa;font-size:16px">⏭</span>
      <div style="flex:1;height:3px;background:#1a1a3a;border-radius:2px;margin:0 8px">
        <div style="background:linear-gradient(to right,#7b2fff,#ff00aa);width:67%;height:100%;border-radius:2px"></div>
      </div>
      <span style="color:#555;font-size:11px">2:34 / 3:47</span>
    </div>
  </div>
</div>
